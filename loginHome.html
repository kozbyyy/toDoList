<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght,GRAD@0,17..18,400..700,48;1,17..18,400..700,48&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container" class="container">
        <h1>Login Autentification</h1>
        <h2>Put your credentials to log in</h2>
        <p style="
        text-align: left;
        color: #555;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 14px;">Username</p>
        <input type="text" id="usernameBar" placeholder="Type your username..."><br>
        <p style="
        text-align: left;
        color: #555;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 14px;">Password</p>
        <input type="text" id="passwordBar" placeholder="Type your password..."><br>
        <button type="button" class="loginButton">Login</button>
        <button type="button" class="registerButton">Register</button>
    </div>
    <script src="./scripts/loginScript.js"></script>
</body>
</html>
